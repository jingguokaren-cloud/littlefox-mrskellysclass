<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mrs. Kelly's Class - 句子重组练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 消除手机端 300ms 点击延迟 */
        button, .btn, .word, .btn-favorites-mode, .btn-speak-sentence,
        .toggle-chinese, .btn-copy-sentence, .btn-show-answer,
        .speak-icon, select, a {
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* 课程选择器样式 */
        .lesson-selector {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .lesson-selector label {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
        }

        .lesson-select {
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: white;
            color: #374151;
            cursor: pointer;
            min-width: 280px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .lesson-select:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .lesson-select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            height: 12px;
            margin: 20px auto;
            max-width: 400px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00f260, #0575e6);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 20px;
        }

        .score-display {
            color: white;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .jump-input {
            width: 42px;
            text-align: center;
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 6px;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
            padding: 2px 4px;
            outline: none;
            touch-action: manipulation;
        }

        .jump-input:focus {
            background: rgba(255,255,255,0.45);
            border-color: white;
        }

        .jump-input::-webkit-outer-spin-button,
        .jump-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .jump-input[type=number] {
            -moz-appearance: textfield;
        }

        .exercise-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .speaker-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .speaker-sam {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .speaker-penny {
            background: linear-gradient(135deg, #ec4899, #be185d);
            color: white;
        }

        .chinese-hint {
            color: #6b7280;
            font-size: 0.95em;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #f3f4f6;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        /* 讲解区域样式 */
        .explanation-area {
            margin-top: 20px;
            display: none;
        }

        .explanation-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 4px solid;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .grammar-card {
            border-left-color: #8b5cf6;
        }

        .phrases-card {
            border-left-color: #10b981;
        }

        .explanation-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .grammar-card .explanation-title {
            color: #7c3aed;
        }

        .phrases-card .explanation-title {
            color: #059669;
        }

        .explanation-content {
            color: #374151;
            font-size: 0.95em;
            line-height: 1.7;
        }

        .explanation-content strong {
            color: #1f2937;
            background: linear-gradient(120deg, #fef3c7 0%, #fde68a 100%);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .phrase-item {
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e5e7eb;
        }

        .phrase-item:last-child {
            margin-bottom: 0;
        }

        .phrase-en {
            font-weight: 600;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .phrase-cn {
            color: #6b7280;
            font-size: 0.9em;
            margin-top: 4px;
        }

        /* 句子控制区域 */
        .sentence-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn-speak-sentence {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .btn-speak-sentence:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .toggle-chinese {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .toggle-chinese:hover {
            border-color: #9ca3af;
        }

        .toggle-chinese.hidden-mode {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-color: transparent;
        }

        .btn-copy-sentence {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .btn-copy-sentence:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .btn-show-answer {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .btn-show-answer:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .chinese-hint.hidden {
            visibility: hidden;
            opacity: 0;
        }

        /* 语法总结区域样式 */
        .grammar-summary {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 15px;
            padding: 25px;
            margin-top: 25px;
            text-align: left;
        }

        .grammar-summary h3 {
            color: #92400e;
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grammar-point {
            background: white;
            border-radius: 12px;
            padding: 15px 18px;
            margin-bottom: 12px;
            border-left: 4px solid #f59e0b;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .grammar-point:last-child {
            margin-bottom: 0;
        }

        /* 新的语法讲解样式 */
        .grammar-explanation {
            color: #374151;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 10px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 8px;
        }

        .grammar-examples {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .grammar-example {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 3px solid #10b981;
        }

        .example-en {
            font-weight: 600;
            color: #1f2937;
            font-size: 0.95em;
        }

        .example-cn {
            color: #6b7280;
            font-size: 0.9em;
        }

        .example-answer {
            color: #059669;
            font-weight: 500;
            font-size: 0.9em;
            background: #d1fae5;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .grammar-point-title {
            font-weight: 600;
            color: #92400e;
            font-size: 1em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grammar-point-content {
            color: #374151;
            font-size: 0.95em;
            line-height: 1.7;
        }

        .btn-speak-grammar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-speak-grammar:hover {
            transform: scale(1.1);
            box-shadow: 0 3px 10px rgba(245, 158, 11, 0.4);
        }

        .btn-speak-grammar svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        /* 发音图标样式 */
        .speak-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .speak-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.4);
        }

        .speak-icon:active {
            transform: scale(0.95);
        }

        .speak-icon svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .speak-icon.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        /* 单词发音提示 */
        .word {
            position: relative;
        }

        .word::after {
            content: '🔊';
            position: absolute;
            right: -8px;
            top: -8px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .word:hover::after {
            opacity: 1;
        }

        .drop-zone {
            min-height: 60px;
            border: 3px dashed #d1d5db;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .drop-zone.drag-over {
            border-color: #667eea;
            background: #f0f4ff;
            transform: scale(1.02);
        }

        .drop-zone.correct {
            border-color: #10b981;
            background: #ecfdf5;
            border-style: solid;
        }

        .drop-zone.wrong {
            border-color: #ef4444;
            background: #fef2f2;
            animation: shake 0.5s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px;
            background: #f8fafc;
            border-radius: 15px;
            min-height: 50px;
        }

        .word {
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 25px;
            cursor: grab;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .word:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .word:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .word.dragging {
            opacity: 0.5;
        }

        #dropZone.correct .word {
            user-select: text;
            cursor: text;
        }

        .word.in-zone {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-check {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-reset {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(107, 114, 128, 0.4);
        }

        .btn-grammar {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-grammar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        /* 语法弹窗样式 */
        .grammar-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .grammar-modal-content {
            background: white;
            border-radius: 20px;
            max-width: 700px;
            max-height: 80vh;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .grammar-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .grammar-modal-header h3 {
            margin: 0;
            font-size: 1.3em;
        }

        .btn-close-modal {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close-modal:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .grammar-modal-body {
            padding: 24px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .fav-shelf-item {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .fav-shelf-en {
            font-size: 1.1em;
            color: #1f2937;
            font-weight: 500;
        }

        .fav-shelf-cn {
            color: #4b5563;
        }

        .fav-shelf-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .fav-shelf-btn {
            background: #f3f4f6;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            color: #4b5563;
        }

        .fav-shelf-btn:hover {
            background: #e5e7eb;
        }

        .btn-next {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-prev {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-prev:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-prev:disabled,
        .btn-nav-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-nav-next {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-nav-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .result-message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }

        .result-message.correct {
            display: block;
            background: #ecfdf5;
            color: #059669;
        }

        .result-message.wrong {
            display: block;
            background: #fef2f2;
            color: #dc2626;
        }

        .completion-screen {
            display: none;
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .completion-screen h2 {
            font-size: 2em;
            color: #10b981;
            margin-bottom: 20px;
        }

        .completion-screen .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .completion-screen .final-score {
            font-size: 1.5em;
            color: #374151;
            margin-bottom: 30px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 40px;
            font-size: 1.1em;
        }

        /* 课程导航按钮容器 */
        .lesson-nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn-lesson-nav {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-lesson-nav:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-lesson-nav:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-lesson-prev {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        .btn-lesson-prev:hover:not(:disabled) {
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-lesson-next {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .btn-lesson-next:hover:not(:disabled) {
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }

        /* 收藏按钮 */
        .btn-favorite {
            background: linear-gradient(135deg, #e5e7eb, #d1d5db);
            color: #9ca3af;
            position: relative;
        }

        .btn-favorite:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(234, 179, 8, 0.3);
        }

        .btn-favorite.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-favorite.active:hover {
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.5);
        }

        /* 收藏夹模式按钮 */
        .btn-favorites-mode {
            padding: 10px 20px;

    <!-- 引入课程数据 -->
    <script src="mrs_kellys_class_data.js"></script>

    <script>
        // 当前状态
        let currentLesson = 1;
        let sentences = [];
        let currentIndex = 0;
        let score = 0;
        let draggedWord = null;
        let currentWords = [];
        let favoritesMode = false;
        let favoriteSentences = []; // 收藏夹模式下的句子列表
        let autoShowAnswer = false; // 连播阅读模式

        const availableLessons = Object.keys(lessonsData).map(Number).sort((a, b) => a - b);

        // 初始化课程选择器
        function initLessonSelector() {
            const select = document.getElementById('lessonSelect');
            select.innerHTML = '';
            availableLessons.forEach(lessonNum => {
                const lesson = lessonsData[lessonNum];
                const option = document.createElement('option');
                option.value = lessonNum;
                option.textContent = `Lesson ${lessonNum}: ${lesson.title} (${lesson.titleCn})`;
                select.appendChild(option);
            });
            select.value = currentLesson;
        }

        // 切换课程
        function changeLesson() {
            // 切换课程时自动退出收藏夹模式
            if (favoritesMode) exitFavoritesMode();
            const select = document.getElementById('lessonSelect');
            currentLesson = parseInt(select.value);
            loadLesson(currentLesson);
        }

        // 加载课程
        function loadLesson(lessonNum) {
            const lesson = lessonsData[lessonNum];
            sentences = lesson.sentences;
            currentIndex = 0;
            score = 0;

            document.getElementById('score').textContent = 0;
            document.getElementById('totalCount').textContent = sentences.length;
            document.getElementById('finalTotal').textContent = sentences.length;

            // 显示练习区域，隐藏完成界面
            document.getElementById('exerciseArea').style.display = 'block';
            document.getElementById('completionScreen').style.display = 'none';

            loadExercise(0);
            updateNavButtons();
        }

        // 初始化
        function init() {
            initLessonSelector();
            loadLesson(currentLesson);
            setupDragAndDrop();
            updateFavoritesBadge();
        }

        // 加载练习题
        function loadExercise(index) {
            const sentence = sentences[index];
            const badge = document.getElementById('speakerBadge');
            badge.textContent = sentence.speaker;
            badge.className = 'speaker-badge ' + sentence.speakerClass;

            document.getElementById('chineseHint').textContent = sentence.chinese;
            if (!sentence.chinese) {
                document.getElementById('chineseHint').style.display = 'none';
            } else {
                document.getElementById('chineseHint').style.display = 'block';
            }
            document.getElementById('jumpInput').value = index + 1;

            // 更新进度条
            const progress = ((index) / sentences.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // 按字母顺序排列单词（标点符号排在最后）
            currentWords = tokenizeSentence(sentence.english).sort((a, b) => {
                const aIsPunct = /^[!?,.'"\-;:]+$/.test(a);
                const bIsPunct = /^[!?,.'"\-;:]+$/.test(b);
                if (aIsPunct && !bIsPunct) return 1;
                if (!aIsPunct && bIsPunct) return -1;
                return a.toLowerCase().localeCompare(b.toLowerCase());
            });

            // 渲染单词池
            renderWordPool();

            // 清空放置区
            const dropZone = document.getElementById('dropZone');
            dropZone.innerHTML = '<span style="color: #9ca3af; font-style: italic;">将单词拖到这里...</span>';
            dropZone.classList.remove('correct', 'wrong');

            // 隐藏结果和下一题按钮
            document.getElementById('resultMessage').className = 'result-message';
            document.getElementById('btnNext').style.display = 'none';

            // 隐藏讲解区域
            document.getElementById('explanationArea').style.display = 'none';

            // 更新收藏按钮状态
            updateFavoriteButton();

            // 如果处于连播阅读模式，直接显示答案
            if (autoShowAnswer) {
                setTimeout(() => showCorrectAnswer(), 50);
            }
        }

        // 分词函数
        function tokenizeSentence(sentence) {
            const tokens = [];
            const regex = /(\w+['’\-]?\w*|[!?,.])/g;
            let match;
            while ((match = regex.exec(sentence)) !== null) {
                tokens.push(match[0]);
            }
            return tokens;
        }

        // 打乱数组
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 渲染单词池
        function renderWordPool() {
            const pool = document.getElementById('wordPool');
            pool.innerHTML = '';
            currentWords.forEach((word, index) => {
                const wordEl = createWordElement(word, index);
                pool.appendChild(wordEl);
            });
        }

        // 创建单词元素
        function createWordElement(word, index) {
            const el = document.createElement('div');
            el.className = 'word';
            el.textContent = word;
            el.draggable = true;
            el.dataset.word = word;
            el.dataset.index = index;

            // 添加点击发音功能（不干扰拖拽）
            el.addEventListener('mousedown', (e) => {
                // 记录点击时间，用于区分点击和拖拽
                el.dataset.clickTime = Date.now();
            });

            el.addEventListener('mouseup', (e) => {
                const clickTime = parseInt(el.dataset.clickTime) || 0;
                const elapsed = Date.now() - clickTime;
                // 如果是快速点击（<200ms），触发发音
                if (elapsed < 200 && !isPunctuation(word)) {
                    speakWord(word);
                }
            });

            return el;
        }

        // 判断是否是标点符号
        function isPunctuation(str) {
            return /^[!?,.'"\-;:]+$/.test(str);
        }

        // 使用有道词典API发音
        function speakWord(word) {
            // 清理单词中可能的标点（将弯引号转为直引号，并保留连字符）
            const cleanWord = word.replace(/’/g, "'").replace(/[^a-zA-Z'\-]/g, '');
            if (!cleanWord) return;

            // 停止之前的音频
            if (window.currentAudio) {
                window.currentAudio.pause();
                window.currentAudio = null;
            }

            // 有道词典API - type=1美式，type=2英式
            const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(cleanWord)}&type=1`;

            const audio = new Audio(audioUrl);
            window.currentAudio = audio;

            audio.play().catch(err => {
                console.log('发音加载失败:', err);
            });
        }

        // 发音按钮点击
        function speakPhrase(text) {
            const cleanText = text.trim().replace(/’/g, "'");
            if (!cleanText) return;

            // 停止之前的音频
            if (window.currentAudio) {
                window.currentAudio.pause();
                window.currentAudio = null;
            }
            if (window.audioTimeout) {
                clearTimeout(window.audioTimeout);
            }
            // 取消之前的 speechSynthesis
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }

            // 如果句子过长（有道API大概超过40-50个字符会报错），直接使用浏览器内置发音
            // 防止有道报错后走兜底逻辑时，因离开点击事件上下文导致浏览器静默拦截发音
            if (cleanText.length > 40) {
                speakWithBrowserTTS(cleanText);
                return;
            }

            // 直接触发播放，兼容 iOS Safari（不能使用 onloadeddata 等异步回调）
            const url = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(cleanText)}&type=1`;
            const audio = new Audio(url);
            window.currentAudio = audio;

            audio.play().catch(err => {
                console.error("Audio play failed on Youdao API, fallback to TTS:", err);
                speakWithBrowserTTS(cleanText);
            });
        }

        // 使用浏览器内置 Web Speech API 作为最终备选
        function speakWithBrowserTTS(text) {
            if (!window.speechSynthesis) {
                console.log('浏览器不支持 speechSynthesis');
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // 获取拖拽时应插入的目标元素
        function getDragAfterElement(container, x, y) {
            const draggableElements = [...container.querySelectorAll('.word:not(.dragging)')];
            for (const child of draggableElements) {
                const box = child.getBoundingClientRect();
                if (y < box.bottom) {
                    if (y > box.top) {
                        if (x < box.left + box.width / 2) return child;
                    } else {
                        return child;
                    }
                }
            }
            return null;
        }

        // 设置拖拽事件
        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            const wordPool = document.getElementById('wordPool');

            document.addEventListener('dragstart', (e) => {
                if (e.target.classList.contains('word')) {
                    draggedWord = e.target;
                    e.target.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                }
            });

            document.addEventListener('dragend', (e) => {
                if (e.target.classList.contains('word')) {
                    e.target.classList.remove('dragging');
                    draggedWord = null;
                }
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
                
                if (draggedWord) {
                    const placeholder = dropZone.querySelector('span[style*="italic"]');
                    if (placeholder) placeholder.remove();

                    draggedWord.classList.add('in-zone');
                    
                    const afterElement = getDragAfterElement(dropZone, e.clientX, e.clientY);
                    if (afterElement) {
                        dropZone.insertBefore(draggedWord, afterElement);
                    } else {
                        dropZone.appendChild(draggedWord);
                    }
                }
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');

                if (draggedWord) {
                    draggedWord.classList.add('in-zone');
                    // 单词位置已经在 dragover 中实时调整好了
                }
            });

            wordPool.addEventListener('dragover', (e) => {
                e.preventDefault();
            });

            wordPool.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedWord && draggedWord.classList.contains('in-zone')) {
                    draggedWord.classList.remove('in-zone');
                    wordPool.appendChild(draggedWord);

                    const dropZone = document.getElementById('dropZone');
                    if (dropZone.querySelectorAll('.word').length === 0) {
                        dropZone.innerHTML = '<span style="color: #9ca3af; font-style: italic;">将单词拖到这里...</span>';
                    }
                }
            });

            // 点击交互（移动端支持）
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('word')) {
                    const word = e.target;
                    const dropZone = document.getElementById('dropZone');
                    const wordPool = document.getElementById('wordPool');

                    if (word.classList.contains('in-zone')) {
                        word.classList.remove('in-zone');
                        wordPool.appendChild(word);

                        if (dropZone.querySelectorAll('.word').length === 0) {
                            dropZone.innerHTML = '<span style="color: #9ca3af; font-style: italic;">将单词拖到这里...</span>';
                        }
                    } else {
                        const placeholder = dropZone.querySelector('span[style*="italic"]');
                        if (placeholder) placeholder.remove();

                        word.classList.add('in-zone');
                        dropZone.appendChild(word);
                    }
                }
            });
        }

        // 一键显示答案
        function showCorrectAnswer() {
            const dropZone = document.getElementById('dropZone');
            const wordPool = document.getElementById('wordPool');
            const correctTokens = tokenizeSentence(sentences[currentIndex].english);

            // 清理 dropZone
            dropZone.innerHTML = '';
            
            // 清理并重新渲染单词池里的内容为空
            wordPool.innerHTML = '';

            // 按正确顺序重新创建单词块并放入 dropZone
            correctTokens.forEach((token, idx) => {
                const wordEl = createWordElement(token, idx);
                wordEl.classList.add('in-zone');
                dropZone.appendChild(wordEl);
            });

            // 触发检查逻辑，显示成功状态和解析
            checkAnswer();
        }

        // 连播阅读模式切换
        function toggleAutoShowAnswer() {
            autoShowAnswer = !autoShowAnswer;
            const btn = document.getElementById('btnShowAnswer');
            if (autoShowAnswer) {
                btn.innerHTML = '🚫 关闭阅读模式';
                btn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)'; // 红色
                
                // 立即显示当前这句的答案（如果还没做正确的话）
                const dropZone = document.getElementById('dropZone');
                if (!dropZone.classList.contains('correct')) {
                    showCorrectAnswer();
                }
            } else {
                btn.innerHTML = '💡 连播阅读模式';
                btn.style.background = ''; // 恢复绿色
            }
        }

        // 检查答案
        function checkAnswer() {
            const dropZone = document.getElementById('dropZone');
            const words = dropZone.querySelectorAll('.word');
            const userTokens = Array.from(words).map(w => w.dataset.word);
            const correctTokens = tokenizeSentence(sentences[currentIndex].english);

            const resultMessage = document.getElementById('resultMessage');

            const isCorrect = userTokens.length === correctTokens.length &&
                userTokens.every((token, i) => token === correctTokens[i]);

            if (isCorrect) {
                dropZone.classList.add('correct');
                dropZone.classList.remove('wrong');
                resultMessage.className = 'result-message correct';
                resultMessage.textContent = '✓ 正确！太棒了！';
                score++;
                document.getElementById('score').textContent = score;
                document.getElementById('btnNext').style.display = 'inline-block';

                // 显示语法和词组讲解
                showExplanation();
            } else {
                dropZone.classList.add('wrong');
                dropZone.classList.remove('correct');
                resultMessage.className = 'result-message wrong';
                resultMessage.textContent = '✗ 再试一次！正确答案: ' + correctTokens.join(' ');

                // 答错自动收藏
                const lesson = favoritesMode ? favoriteSentences[currentIndex].lesson : currentLesson;
                const sentenceIdx = favoritesMode ? favoriteSentences[currentIndex].index : currentIndex;
                if (!isFavorited(lesson, sentenceIdx)) {
                    addFavorite(lesson, sentenceIdx);
                    showToast('⭐ 已自动收藏此句子', 'info');
                    updateFavoriteButton();
                }
            }
        }

        // 一键复制句子进行AI讲解
        function copySentenceWithPrompt() {
            const sentence = sentences[currentIndex].english;
            const prompt = sentence + " 请帮我细分析这句话的语法结构。";

            // 使用新版剪贴板 API 或备用方案
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(prompt).then(() => {
                    showToast('✅ 已复制：' + sentence.substring(0, 15) + '...', 'success');
                }).catch(err => {
                    fallbackCopyTextToClipboard(prompt);
                });
            } else {
                fallbackCopyTextToClipboard(prompt);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; // 避免滚动
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('✅ 复制成功！可以去AI提问啦', 'success');
                } else {
                    showToast('❌ 复制失败，请手动复制', 'wrong');
                }
            } catch (err) {
                console.error('复制失败', err);
                showToast('❌ 复制失败，请手动复制', 'wrong');
            }
            document.body.removeChild(textarea);
        }

        // ===== 收藏夹功能 =====

        // 获取收藏列表
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('nce1_favorites') || '[]');
            } catch { return []; }
        }

        // 保存收藏列表
        function saveFavorites(favs) {
            localStorage.setItem('nce1_favorites', JSON.stringify(favs));
            updateFavoritesBadge();
        }

        // 检查是否已收藏
        function isFavorited(lesson, index) {
            return getFavorites().some(f => f.lesson === lesson && f.index === index);
        }

        // 添加收藏
        function addFavorite(lesson, index) {
            const favs = getFavorites();
            if (!favs.some(f => f.lesson === lesson && f.index === index)) {
                favs.push({ lesson, index });
                saveFavorites(favs);
            }
        }

        // 移除收藏
        function removeFavorite(lesson, index) {
            const favs = getFavorites().filter(f => !(f.lesson === lesson && f.index === index));
            saveFavorites(favs);
        }

        // 切换收藏
        function toggleFavorite() {
            const lesson = favoritesMode ? favoriteSentences[currentIndex].lesson : currentLesson;
            const sentenceIdx = favoritesMode ? favoriteSentences[currentIndex].index : currentIndex;

            if (isFavorited(lesson, sentenceIdx)) {
                removeFavorite(lesson, sentenceIdx);
                showToast('已取消收藏', 'success');
            } else {
                addFavorite(lesson, sentenceIdx);
                showToast('⭐ 已收藏', 'info');
            }
            updateFavoriteButton();
        }

        // 更新收藏按钮 UI
        function updateFavoriteButton() {
            const btn = document.getElementById('btnFavorite');
            if (!btn) return;
            const lesson = favoritesMode ? favoriteSentences[currentIndex].lesson : currentLesson;
            const sentenceIdx = favoritesMode ? favoriteSentences[currentIndex].index : currentIndex;

            if (isFavorited(lesson, sentenceIdx)) {
                btn.classList.add('active');
                btn.textContent = '★ 已收藏';
            } else {
                btn.classList.remove('active');
                btn.textContent = '☆ 收藏';
            }
        }

        // 更新收藏夹角标
        function updateFavoritesBadge() {
            const badge = document.getElementById('favoritesBadge');
            if (!badge) return;
            const count = getFavorites().length;
            badge.textContent = count;
            badge.classList.toggle('empty', count === 0);
        }

        // 切换收藏夹模式
        function toggleFavoritesMode() {
            if (favoritesMode) {
                exitFavoritesMode();
            } else {
                enterFavoritesMode();
            }
        }

        // 进入收藏夹模式
        function enterFavoritesMode() {
            const favs = getFavorites();
            if (favs.length === 0) {
                showToast('收藏夹为空，快去收藏句子吧！', 'info');
                return;
            }

            favoritesMode = true;
            favoriteSentences = favs;

            // 构建收藏句子列表
            sentences = favs.map(f => {
                const lessonData = lessonsData[f.lesson];
                if (lessonData && lessonData.sentences[f.index]) {
                    return lessonData.sentences[f.index];
                }
                return null;
            }).filter(s => s !== null);

            // 同步过滤 favoriteSentences（移除无效项）
            favoriteSentences = favs.filter(f => {
                const lessonData = lessonsData[f.lesson];
                return lessonData && lessonData.sentences[f.index];
            });

            if (sentences.length === 0) {
                showToast('收藏的句子数据已失效', 'info');
                favoritesMode = false;
                return;
            }

            currentIndex = 0;
            score = 0;

            document.getElementById('score').textContent = 0;
            document.getElementById('totalCount').textContent = sentences.length;
            document.getElementById('finalTotal').textContent = sentences.length;
            document.getElementById('exerciseArea').style.display = 'block';
            document.getElementById('completionScreen').style.display = 'none';

            // 更新 UI 状态
            document.getElementById('btnFavoritesMode').classList.add('active');
            document.getElementById('lessonSelect').disabled = true;

            loadExercise(0);
            updateNavButtons();
        }

            favoritesMode = false;
            favoriteSentences = [];

            document.getElementById('btnFavoritesMode').classList.remove('active');
            document.getElementById('lessonSelect').disabled = false;

            loadLesson(currentLesson);
        }

        function copyShelfSentence(sentenceText) {
            const prompt = sentenceText + " 请帮我细分析这句话的语法结构。";
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(prompt).then(() => {
                    showToast('✅ 复制成功！可以去AI提问啦', 'success');
                }).catch(err => {
                    fallbackCopyTextToClipboard(prompt);
                });
            } else {
                fallbackCopyTextToClipboard(prompt);
            }
        }

        function removeFromShelf(lesson, index) {
            removeFavorite(lesson, index);
            showFavoritesShelf();
            updateFavoriteButton();
        }

        // ------------------ 生词本逻辑 ------------------
        function favoriteSelectedWord() {
            const text = window.getSelection().toString().trim();
            if (!text) {
                showToast('请先用鼠标选中文本！', 'wrong');
                return;
            }
            const words = getVocabWords();
            if (!words.includes(text)) {
                words.push(text);
                saveVocabWords(words);
                showToast('✅ 成功收藏生词: ' + text, 'success');
            } else {
                showToast('这个生词已经收藏过啦！', 'info');
            }
        }

        function getVocabWords() {
            try {
                return JSON.parse(localStorage.getItem('nce1_vocab') || '[]');
            } catch { return []; }
        }

        function saveVocabWords(words) {
            localStorage.setItem('nce1_vocab', JSON.stringify(words));
        }

        function showVocabShelf() {
            const words = getVocabWords();
            const body = document.getElementById('vocabShelfBody');
            if (words.length === 0) {
                body.innerHTML = '<p style="text-align:center; padding: 40px 20px; color:#6b7280;">您的生词本是空的，鼠标选中不认识的词，点击"📌 收藏选中词"即可保存。</p>';
            } else {
                let html = '<div style="padding: 15px; display: flex; flex-wrap: wrap; gap: 10px;">';
                words.forEach((w) => {
                    html += `
                        <div class="word" style="cursor:default; display:flex; align-items:center; gap:8px; padding-right:10px;">
                            <span style="user-select:text;">${w}</span>
                            <span onclick="speakPhrase('${w.replace(/'/g, "\\'")}')" style="cursor:pointer; opacity:0.8;">🔊</span>
                            <span onclick="removeVocabWord('${w.replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" style="cursor:pointer; color:#ef4444; font-weight:bold; margin-left:4px;">×</span>
                        </div>
                    `;
                });
                html += '</div>';
                body.innerHTML = html;
            }
            document.getElementById('vocabShelfModal').style.display = 'flex';
        }

        function closeVocabShelf() {
            document.getElementById('vocabShelfModal').style.display = 'none';
        }

        function removeVocabWord(word) {
            const words = getVocabWords().filter(w => w !== word);
            saveVocabWords(words);
            showVocabShelf();
        }

        // 启动
        init();
    </script>
</body>

</html>
